<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANGIO-SCANNER - Étude Gériatrie</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* التنسيقات الخاصة بك */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #0a0a0a; color: white; }
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .logo { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #ffcc00; overflow: hidden; cursor: pointer; box-shadow: 0 0 30px #ffcc00; animation: pulse 2s infinite; background: #222; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
        h1 { color: #ffcc00; margin-top: 30px; letter-spacing: 5px; }
        #main-content { max-width: 800px; margin: 0 auto; padding: 20px; display: none; }
        .header { background: #111; border-bottom: 2px solid #ffcc00; padding: 15px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 100; margin-bottom: 20px; }
        .progress { color: #ffcc00; font-weight: bold; }
        .section-title { background: rgba(255,204,0,0.1); color: #ffcc00; padding: 15px; margin: 30px 0 15px; border-left: 4px solid #ffcc00; font-weight: bold; font-size: 1.2rem; }
        .question-card { background: #111; border-radius: 10px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .question-text { font-weight: bold; margin-bottom: 15px; line-height: 1.5; }
        .option { display: block; width: 100%; text-align: left; padding: 15px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .option:hover { border-color: #ffcc00; }
        .option.selected { background: #ffcc00; color: black; font-weight: bold; }
        .text-input { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; min-height: 100px; }
        .btn-submit { width: 100%; background: #ffcc00; color: black; border: none; padding: 20px; border-radius: 10px; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin: 30px 0; }
        .btn-submit:disabled { background: #333; color: #666; cursor: not-allowed; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 2000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #ffcc00; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .admin-link { text-align: center; color: #444; cursor: pointer; margin: 20px 0; font-size: 0.8rem; }
        #admin-panel { background: #111; border-radius: 10px; padding: 20px; margin-top: 30px; display: none; border: 1px solid #ffcc00; }
        .stat-item { margin: 15px 0; padding: 15px; background: #1a1a1a; border-radius: 8px; }
        .stat-bar-bg { height: 10px; background: #333; border-radius: 5px; margin-top: 5px; }
        .stat-bar-fill { height: 100%; background: #ffcc00; border-radius: 5px; }
        .response-card { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-left: 4px solid #ffcc00; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top:20px;color:#ffcc00;">Connexion...</p>
</div>

<div id="welcome-screen">
    <div class="logo" onclick="startApp()">
        <img src="1000033460.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/200/ffcc00/000000?text=INFSPM'">
    </div>
    <h1>ANGIO-SCANNER</h1>
    <p style="color:#666;margin-top:10px;">Cliquez sur le logo pour commencer</p>
</div>

<div id="main-content">
    <div class="header">
        <span style="font-weight:bold; color:#ffcc00;">INFSPM</span>
        <span class="progress" id="progress">0 / 25</span>
    </div>

    <div id="questions-container"></div>
    
    <button class="btn-submit" id="submitBtn" onclick="sendAnswers()" disabled>FINALISER & ENVOYER</button>
    
    <div class="admin-link" onclick="showAdminPanel()">⚙️ Console Admin</div>

    <div id="admin-panel">
        <h2 style="color:#ffcc00;">Console d'administration</h2>
        <div id="login-area" style="margin-top:20px;">
            <input type="password" id="admin-password" placeholder="Code secret" style="padding:10px; width:100%; margin-bottom:10px;">
            <button onclick="validateAdmin()" style="padding:10px; width:100%; background:#ffcc00; border:none; cursor:pointer;">Accéder</button>
        </div>
        <div id="data-area" style="display:none; margin-top:20px;">
            <div id="stats-container"></div>
            <hr style="margin:20px 0; border:0; border-top:1px solid #333;">
            <div id="responses-container"></div>
        </div>
    </div>
</div>

<script>
    // 1. إعدادات Firebase (المعلومات التي قدمتها صحيحة)
    const firebaseConfig = {
        apiKey: "AIzaSyDkKEdm85pDRJ5PgaSdn-lxBRyu0uZPF4Y",
        authDomain: "angioscanner-survey.firebaseapp.com",
        projectId: "angioscanner-survey",
        storageBucket: "angioscanner-survey.firebasestorage.app",
        messagingSenderId: "768907518533",
        appId: "1:768907518533:web:21a3de5ca64416a1b2792c"
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const COLLECTION_NAME = "reponses_angioscanner";

    let answers = {};
    const questions = [
        { id: 1, section: "I. Informations professionnelles", text: "Sexe :", options: ["Masculin", "Féminin"] },
        { id: 2, text: "Tranche d'âge :", options: ["20-30", "31-40", "41-50", ">50"] },
        { id: 3, text: "Années d'expérience :", options: ["<5 ans", "5-10 ans", "11-20 ans", ">20 ans"] },
        { id: 4, text: "Grade :", options: ["MIMSP", "MIM spécialiste", "Autre"] },
        { id: 5, text: "Type d'établissement :", options: ["Hôpital public", "Clinique privée"] },
        { id: 6, section: "II. Expérience", text: "Réalisez-vous régulièrement des angioscanners ?", options: ["Oui", "Non"] },
        { id: 7, text: "Nombre d'examens par mois :", options: ["0-5", "6-10", "11-20", ">20"] },
        { id: 8, text: "Examen de première intention pour EP ?", options: ["Oui", "Non"] },
        { id: 9, text: "Maîtrisez-vous le protocole technique ?", options: ["Oui", "Non"] },
        { id: 10, text: "Injecteur automatique disponible ?", options: ["Oui", "Non"] },
        { id: 11, section: "III. Patients Âgés", text: "Recevez-vous fréquemment des patients >65 ans ?", options: ["Oui", "Non"] },
        { id: 12, text: "Plus de difficultés avec les patients âgés ?", options: ["Oui", "Non"] },
        { id: 13, text: "Principales difficultés :", options: ["Communication", "Compréhension", "Agitation", "Positionnement", "Pathologies", "Autres"] },
        { id: 14, text: "Adaptez-vous votre explication ?", options: ["Oui", "Non"] },
        { id: 15, text: "Techniques de communication :", options: ["Parler lentement", "Gestes", "Répéter", "Accompagnant"] },
        { id: 16, section: "IV. Communication", text: "Influence-t-elle la qualité ?", options: ["Oui", "Non"] },
        { id: 17, text: "Risque d'artéfacts si mauvaise com ?", options: ["Oui", "Non"] },
        { id: 18, text: "Prenez-vous plus de temps ?", options: ["Oui", "Non"] },
        { id: 19, text: "L'accompagnant aide-t-il ?", options: ["Oui", "Non"] },
        { id: 20, text: "Formation en com gériatrique ?", options: ["Oui", "Non"] },
        { id: 21, section: "V. Qualité", text: "Rôle essentiel du manipulateur ?", options: ["Oui", "Non"] },
        { id: 22, text: "Facteurs de qualité :", options: ["Préparation", "Protocole", "Communication", "Expérience", "Équipement"] },
        { id: 23, text: "Trouvez-vous des solutions aux difficultés ?", options: ["Oui", "Non"] },
        { id: 24, text: "Stratégies utilisées :", type: "text" },
        { id: 25, text: "Améliorations proposées :", type: "text" }
    ];

    function startApp() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        renderQuestions();
    }

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        questions.forEach(q => {
            if (q.section) {
                const s = document.createElement('div');
                s.className = 'section-title';
                s.textContent = q.section;
                container.appendChild(s);
            }
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `<div class="question-text">${q.id}. ${q.text}</div>`;
            
            if (q.options) {
                q.options.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'option';
                    b.textContent = opt;
                    b.onclick = () => {
                        card.querySelectorAll('.option').forEach(btn => btn.classList.remove('selected'));
                        b.classList.add('selected');
                        answers[q.id] = opt;
                        updateProgress();
                    };
                    card.appendChild(b);
                });
            } else {
                const txt = document.createElement('textarea');
                txt.className = 'text-input';
                txt.oninput = (e) => {
                    answers[q.id] = e.target.value;
                    updateProgress();
                };
                card.appendChild(txt);
            }
            container.appendChild(card);
        });
    }

    function updateProgress() {
        const count = Object.keys(answers).length;
        document.getElementById('progress').textContent = `${count} / 25`;
        document.getElementById('submitBtn').disabled = count < 25;
    }

    async function sendAnswers() {
        document.getElementById('loader').style.display = 'flex';
        try {
            await db.collection(COLLECTION_NAME).add({
                ...answers,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                date: new Date().toLocaleString()
            });
            document.getElementById('main-content').innerHTML = `
                <div style="text-align:center; padding:50px;">
                    <h2 style="color:#ffcc00;">MERCI !</h2>
                    <p>Vos réponses ont été enregistrées avec succès.</p>
                    <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:#ffcc00; border:none; cursor:pointer;">Nouveau formulaire</button>
                </div>`;
        } catch (e) {
            alert("Erreur lors de l'envoi: " + e.message);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    // إدارة البيانات (Admin)
    function showAdminPanel() {
        document.getElementById('admin-panel').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function validateAdmin() {
        if (document.getElementById('admin-password').value === 'anwar17blt') {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('data-area').style.display = 'block';
            loadData();
        } else {
            alert("Code incorrect");
        }
    }

    async function loadData() {
        const snapshot = await db.collection(COLLECTION_NAME).get();
        const data = [];
        snapshot.forEach(doc => data.push(doc.data()));
        
        // عرض الإحصائيات البسيطة
        let html = `<h3>Total: ${data.length} réponses</h3>`;
        document.getElementById('stats-container').innerHTML = html;

        // عرض الإجابات الفردية
        let respHtml = "<h3>Réponses individuelles :</h3>";
        data.forEach((item, index) => {
            respHtml += `<div class="response-card"><strong>#${index+1}</strong> - ${item.date || ''}<br>`;
            respHtml += `<small>${JSON.stringify(item)}</small></div>`;
        });
        document.getElementById('responses-container').innerHTML = respHtml;
    }
</script>
</body>
</html>
