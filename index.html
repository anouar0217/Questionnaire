<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angioscanner Cloud Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Raleway:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; overflow-x: hidden; width: 100%; height: 100%; }

        /* شاشة الترحيب - الإصلاح الجذري */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999999; background: #000; display: flex; align-items: center; justify-content: center;
        }

        .bg-fixed-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('1000037059.png') no-repeat center center;
            background-size: cover; opacity: 0.6; z-index: 1;
        }

        .interactive-layer {
            position: relative; z-index: 2; text-align: center; width: 100%;
        }

        /* حاوية اللوجو - جعلناها تستجيب للنقر بأي ثمن */
        .logo-wrapper {
            position: relative; width: 200px; height: 200px; margin: 0 auto;
            border-radius: 50%; border: 5px solid var(--gold);
            box-shadow: 0 0 40px var(--gold); animation: pulse 2s infinite;
            cursor: pointer; overflow: hidden; z-index: 9999999; /* طبقة عليا جداً */
        }

        .logo-wrapper img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--gold); } 50% { transform: scale(1.05); box-shadow: 0 0 50px var(--gold); } }

        /* التطبيق الرئيسي */
        #main-app { display: none; }
        .navbar { position: sticky; top: 0; background: #000; border-bottom: 2px solid var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .section-header { background: rgba(255,204,0,0.1); color: var(--gold); font-family: 'Orbitron'; padding: 15px; margin: 30px 0; border-radius: 10px; border: 1px solid var(--gold); text-align: center; }
        .q-card { background: #0a0a0a; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .opt-btn { width: 100%; text-align: left; padding: 15px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; cursor: pointer; font-size: 1rem; }
        .opt-btn.active { background: var(--gold); color: #000; font-weight: bold; border-color: #fff; }
        .text-area { width: 100%; background: #000; color: var(--gold); padding: 15px; border-radius: 10px; border: 1px solid #444; min-height: 100px; outline: none; }
        .btn-submit { width: 100%; background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem; cursor: pointer; margin-top: 20px; }
        .btn-submit:disabled { background: #333; cursor: not-allowed; color: #666; }

        #cloud-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 1000000; align-items: center; justify-content: center; color: var(--gold); font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="cloud-loader">SYNCHRONISATION...</div>

<!-- شاشة الترحيب -->
<div id="welcome-screen">
    <div class="bg-fixed-layer"></div>
    <div class="interactive-layer">
        <!-- أضفنا الـ onclick هنا مباشرة وبشكل صريح جداً -->
        <div class="logo-wrapper" onclick="handleStartClick()">
            <img src="1000033460.jpg" alt="Logo">
        </div>
        <h1 style="font-family:'Orbitron'; color:var(--gold); margin-top:30px; letter-spacing:8px; font-weight:900; text-shadow: 0 0 20px #000;">WELCOME</h1>
        <p style="color:#aaa; font-family:'Raleway'; margin-top:10px; letter-spacing:2px;">CLIQUEZ SUR LE LOGO POUR COMMENCER</p>
    </div>
</div>

<div id="main-app">
    <nav class="navbar">
        <div style="font-family:'Orbitron'; color:var(--gold); font-weight:bold; font-size:1.2rem;">INFSPM</div>
        <div id="prog-text" style="color:var(--gold); font-family:'Orbitron';">0 / 25</div>
    </nav>

    <div class="container" id="survey-ui">
        <div id="questions-list"></div>
        <button id="final-btn" class="btn-submit" disabled onclick="sendDataToFirebase()">ENVOYER LES DONNÉES</button>
        <p onclick="adminAccess()" style="text-align:center; color:#111; margin-top:80px; cursor:pointer;">Admin</p>
    </div>

    <div class="container" id="admin-ui" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="color:var(--gold); font-family:'Orbitron';">DASHBOARD SÉCURISÉ</h2>
            <button onclick="location.reload()" style="background:red; border:none; color:#fff; padding:8px 15px; border-radius:8px; cursor:pointer;">RETOUR</button>
        </div>
        <div id="stats-render"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'angioscan-global-v3';

    let user = null;
    let userAnswers = {};
    let allCloudData = [];

    signInAnonymously(auth).catch(console.error);
    onAuthStateChanged(auth, u => { user = u; });

    const questions = [
        { id: 1, section: "I. Données Socio-démographiques", q: "Quel est votre sexe ?", opt: ["Masculin", "Féminin"] },
        { id: 2, q: "Quelle est votre tranche d'âge ?", opt: ["20 – 30 ans", "31 – 40 ans", "41 – 50 ans", "Plus de 50 ans"] },
        { id: 3, q: "Combien d'années d'expérience avez-vous في domaine de la radiologie ?", opt: ["Moins de 5 ans", "5 – 10 ans", "11 – 20 ans", "Plus de 20 ans"] },
        { id: 4, q: "Quel est votre grade actuel (Manipulateur, Médecin, etc.) ?", type: "text" },
        { id: 5, q: "Dans quel type d'établissement travaillez-vous ?", opt: ["EPH", "Clinique privée"] },
        { id: 6, section: "II. Pratique de l'Angioscanner", q: "Réalisez-vous régulièrement des examens d'angioscanner ?", opt: ["Oui", "Non"] },
        { id: 7, q: "Combien d'angioscanners réalisez-vous par mois ?", opt: ["0 – 5", "6 – 10", "11 – 20", "Plus de 20"] },
        { id: 8, q: "L'angioscanner est-il pour vous l'examen de première intention ?", opt: ["Oui", "Non"] },
        { id: 9, q: "Maîtrisez-vous parfaitement le protocole technique ?", opt: ["Oui", "Non"] },
        { id: 10, q: "Disposez-vous d'un injecteur automatique ?", opt: ["Oui", "Non"] },
        { id: 11, section: "III. Le Sujet Âgé & Communication", q: "Recevez-vous fréquemment des patients âgés (+65 ans) ?", opt: ["Oui", "Non"] },
        { id: 12, q: "La réalisation d'un angioscanner chez un sujet âgé présente-t-elle plus de difficultés ?", opt: ["Oui", "Non"] },
        { id: 13, q: "Quelle est la principale difficulté rencontrée ?", opt: ["Communication", "Agitation", "Accès veineux"] },
        { id: 14, q: "Adaptez-vous votre façon d'expliquer l'examen ?", opt: ["Oui", "Non"] },
        { id: 15, q: "Quelle technique de communication privilégiez-vous ?", opt: ["Lentement/Fort", "Gestes", "Accompagnant"] },
        { id: 16, q: "Pensez-vous qu'une bonne communication influence la qualité de l'image ?", opt: ["Oui", "Non"] },
        { id: 17, q: "Avez-vous déjà dû recommencer une acquisition à cause d'un défaut de communication ?", opt: ["Oui", "Non"] },
        { id: 18, q: "Prenez-vous plus de temps pour la préparation psychologique ?", opt: ["Oui", "Non"] },
        { id: 19, q: "La présence d'un proche facilite-elle la coopération ?", opt: ["Oui", "Non"] },
        { id: 20, section: "IV. Formation & Solutions", q: "Avez-vous reçu une formation spécifique sur la communication ?", opt: ["Oui", "Non"] },
        { id: 21, q: "Pensez-vous que le rôle du manipulateur est déterminant ?", opt: ["Oui", "Non"] },
        { id: 22, q: "Quel est le facteur le plus important ?", opt: ["Technique", "Communication", "Rapidité"] },
        { id: 23, q: "Arrivez-vous généralement à trouver des solutions ?", opt: ["Oui", "Non"] },
        { id: 24, q: "Quelles sont vos stratégies pour rassurer un patient anxieux ?", type: "text" },
        { id: 25, q: "Quelles sont vos suggestions pour améliorer la prise en charge ?", type: "text" }
    ];

    window.handleStartClick = () => {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        initQuestions();
    };

    function initQuestions() {
        const mount = document.getElementById('questions-list');
        if(mount.children.length > 0) return;
        questions.forEach(q => {
            if(q.section) {
                const head = document.createElement('div'); head.className = 'section-header'; head.innerText = q.section; mount.appendChild(head);
            }
            const card = document.createElement('div'); card.className = 'q-card';
            card.innerHTML = `<p style="margin-bottom:15px; font-weight:900;">${q.id}. ${q.q}</p>`;
            const box = document.createElement('div');
            if(q.opt) {
                q.opt.forEach(o => {
                    const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = o;
                    btn.onclick = () => {
                        Array.from(box.children).forEach(b => b.classList.remove('active'));
                        btn.classList.add('active'); userAnswers[q.id] = o; updateProgress();
                    };
                    box.appendChild(btn);
                });
            } else {
                const txt = document.createElement('textarea'); txt.className = 'text-area'; txt.placeholder = "Votre réponse...";
                txt.oninput = () => { if(txt.value.trim()){userAnswers[q.id]=txt.value.trim();}else{delete userAnswers[q.id];} updateProgress(); };
                box.appendChild(txt);
            }
            card.appendChild(box); mount.appendChild(card);
        });
    }

    function updateProgress() {
        const count = Object.keys(userAnswers).length;
        document.getElementById('prog-text').innerText = `${count} / 25`;
        document.getElementById('final-btn').disabled = count === 0;
    }

    window.sendDataToFirebase = async () => {
        if(!user) return;
        document.getElementById('cloud-loader').style.display = 'flex';
        try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'survey'), { ...userAnswers, timestamp: new Date().toISOString() });
            document.getElementById('survey-ui').innerHTML = `<div style="text-align:center; padding:100px 20px;"><img src="1000037018.png" style="width:150px; border-radius:30px; border:2px solid var(--gold); box-shadow: 0 0 20px var(--gold);"><h2 style="color:var(--gold); margin-top:30px; font-family:'Orbitron';">TERMINÉ AVEC SUCCÈS</h2><p style="opacity:0.6; margin-top:10px;">Données sauvegardées sur le Cloud</p><button onclick="location.reload()" class="btn-submit" style="width:auto; padding:10px 40px; margin-top:30px;">RETOUR</button></div>`;
        } catch(e) { alert("Erreur de connexion Cloud."); }
        document.getElementById('cloud-loader').style.display = 'none';
    };

    window.adminAccess = async () => {
        const pin = prompt("Code Administrateur :");
        if(pin === 'anwar17blt') {
            document.getElementById('cloud-loader').style.display = 'flex';
            try {
                const snap = await getDocs(query(collection(db, 'artifacts', appId, 'public', 'data', 'survey')));
                allCloudData = snap.docs.map(d => d.data());
                document.getElementById('survey-ui').style.display = 'none';
                document.getElementById('admin-ui').style.display = 'block';
                renderAdminStats();
            } catch(e) { alert("Accès impossible."); }
            document.getElementById('cloud-loader').style.display = 'none';
        }
    };

    function renderAdminStats() {
        const dest = document.getElementById('stats-render');
        let html = `<div style="background:var(--gold); color:#000; padding:15px; border-radius:10px; text-align:center; font-weight:bold; margin-bottom:25px; font-family:'Orbitron';">SESSIONS CLOUD : ${allCloudData.length}</div>`;
        questions.forEach(q => {
            html += `<div class="q-card"><strong>${q.id}. ${q.q}</strong>`;
            if(q.opt) {
                q.opt.forEach(o => {
                    const c = allCloudData.filter(d => d[q.id] === o).length;
                    const p = allCloudData.length ? ((c/allCloudData.length)*100).toFixed(1) : 0;
                    html += `<div style="font-size:0.85rem; margin-top:12px; display:flex; justify-content:space-between;"><span>${o}</span><span>${p}%</span></div><div style="height:8px; background:#222; border-radius:4px; margin-top:4px;"><div style="width:${p}%; background:var(--gold); height:100%; border-radius:4px;"></div></div>`;
                });
            } else {
                allCloudData.forEach(d => { if(d[q.id]) html += `<div style="color:var(--gold); font-size:0.8rem; margin-top:10px; border-top:1px solid #1a1a1a; padding-top:5px;">• ${d[q.id]}</div>`; });
            }
            html += `</div>`;
        });
        dest.innerHTML = html;
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
