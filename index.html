<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angioscanner Cloud Master System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Raleway:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --bg: #000; --card: #0c0c0c; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; overflow-x: hidden; }

        /* ЎіЎІЎіЎ© ЎІўДЎ™Ў±Ў≠ўКЎ® */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center;
            flex-direction: column;
        }
        .stickers-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.2; pointer-events: none;
        }
        .sticker { position: absolute; font-size: 2.5rem; animation: floatAnim 10s infinite linear; }
        @keyframes floatAnim {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .logo-btn {
            position: relative; z-index: 100; width: 220px; height: 220px;
            border-radius: 50%; border: 6px solid var(--gold);
            box-shadow: 0 0 30px var(--gold); cursor: pointer;
            overflow: hidden; animation: pulse 2s infinite;
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        .logo-btn img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* ЎІўДЎ™ЎЈЎ®ўКўВ ЎІўДЎ±Ў¶ўКЎ≥ўК */
        #app-content { display: none; }
        .navbar { position: sticky; top: 0; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .section-title { background: rgba(255,204,0,0.1); color: var(--gold); font-family: 'Orbitron'; padding: 15px; margin: 30px 0; border-radius: 12px; border: 1px solid var(--gold); text-align: center; font-weight: bold; }
        .q-card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 1px solid #222; }
        .opt-btn { width: 100%; text-align: left; padding: 16px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .opt-btn.active { background: var(--gold); color: #000; font-weight: 900; }
        .text-area { width: 100%; background: #000; color: var(--gold); padding: 15px; border-radius: 12px; border: 1px solid #444; min-height: 100px; outline: none; }
        .submit-btn { width: 100%; background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem; cursor: pointer; margin: 30px 0 60px; }
        .submit-btn:disabled { background: #333; cursor: not-allowed; opacity: 0.5; }

        /* ўДўИЎ≠Ў© ЎІўДўЖЎ™ЎІЎ¶Ўђ */
        .admin-view { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #222; border: none; color: #fff; cursor: pointer; border-radius: 5px; font-family: 'Orbitron'; }
        .tab-btn.active { background: var(--gold); color: #000; }
        .voter-card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--gold); cursor: pointer; }
        .stat-bar { height: 10px; background: #222; border-radius: 5px; margin: 5px 0 15px; overflow: hidden; }
        .stat-fill { height: 100%; background: var(--gold); }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; color: var(--gold); font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="loader">
    <div style="border:4px solid #111; border-top-color:var(--gold); width:40px; height:40px; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p style="margin-top:20px;">SYNC SATELLITE...</p>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<div id="welcome-screen">
    <div class="stickers-layer" id="stickers-mount"></div>
    <div class="logo-btn" onclick="initApp()">
        <img src="1000033460.jpg" alt="Logo">
    </div>
    <h1 style="font-family:'Orbitron'; color:var(--gold); margin-top:30px; letter-spacing:8px;">WELCOME</h1>
    <p style="color:#555; margin-top:10px;">TOUCHER POUR COMMENCER</p>
</div>

<div id="app-content">
    <nav class="navbar">
        <div style="font-family:'Orbitron'; color:var(--gold); font-weight:900;">INFSPM</div>
        <div id="prog-val" style="color:var(--gold); font-family:'Orbitron';">0 / 25</div>
    </nav>

    <div class="container" id="survey-ui">
        <div id="questions-mount"></div>
        <button id="main-submit" class="submit-btn" disabled onclick="pushToCloud()">FINALISER & ENVOYER</button>
        <p onclick="adminGate()" style="text-align:center; color:#333; cursor:pointer;">Admin Console</p>
    </div>

    <div class="container admin-view" id="admin-ui">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2 style="font-family:'Orbitron'; color:var(--gold);">CONSOLE CLOUD</h2>
            <button onclick="location.reload()" style="background:red; color:white; border:none; padding:5px 15px; border-radius:5px;">SORTIR</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('stats')">ANALYSES</button>
            <button class="tab-btn" onclick="switchTab('voters')">R√ЙPONSES INDIV.</button>
        </div>

        <div id="admin-content"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // Configuration Firebase - Remplacez ces valeurs par votre configuration
    const firebaseConfig = {
        apiKey: "VOTRE_API_KEY",
        authDomain: "VOTRE_AUTH_DOMAIN",
        projectId: "VOTRE_PROJECT_ID",
        storageBucket: "VOTRE_STORAGE_BUCKET",
        messagingSenderId: "VOTRE_MESSAGING_SENDER_ID",
        appId: "VOTRE_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const COLLECTION_NAME = 'angioscanner_responses';

    let user = null;
    let results = {};
    let cloudRecords = [];
    let currentTab = 'stats';

    signInAnonymously(auth).catch(error => {
        console.error("Erreur d'authentification:", error);
        alert("Erreur de connexion √† Firebase. V√©rifiez votre configuration.");
    });
    
    onAuthStateChanged(auth, u => user = u);

    // ўЕўДЎµўВЎІЎ™ ЎІўДЎЃўДўБўКЎ©
    const radIcons = ['рЯ©ї', 'вШҐпЄП', 'рЯІ†', 'рЯ¶і', 'рЯІђ', 'рЯП•', 'рЯ©Ї', 'вЪХпЄП'];
    const mount = document.getElementById('stickers-mount');
    for(let i=0; i<15; i++) {
        const s = document.createElement('span');
        s.className = 'sticker';
        s.innerText = radIcons[Math.floor(Math.random()*radIcons.length)];
        s.style.left = Math.random()*90 + '%';
        s.style.animationDelay = Math.random()*10 + 's';
        mount.appendChild(s);
    }

    const questions = [
        { id: 1, section: "I. Donn√©es Socio-d√©mographiques", q: "Quel est votre sexe ?", opt: ["Masculin", "F√©minin"] },
        { id: 2, q: "Quelle est votre tranche d'√Ґge ?", opt: ["20 вАУ 30 ans", "31 вАУ 40 ans", "41 вАУ 50 ans", "Plus de 50 ans"] },
        { id: 3, q: "Combien d'ann√©es d'exp√©rience avez-vous dans le domaine de la radiologie ?", opt: ["Moins de 5 ans", "5 вАУ 10 ans", "11 вАУ 20 ans", "Plus de 20 ans"] },
        { id: 4, q: "Quel est votre grade actuel (Manipulateur, M√©decin, etc.) ?", type: "text" },
        { id: 5, q: "Dans quel type d'√©tablissement travaillez-vous ?", opt: ["EPH", "Clinique priv√©e"] },
        { id: 6, section: "II. Pratique de l'Angioscanner", q: "R√©alisez-vous r√©guli√®rement des examens d'angioscanner ?", opt: ["Oui", "Non"] },
        { id: 7, q: "Combien d'angioscanners r√©alisez-vous par mois ?", opt: ["0 вАУ 5", "6 вАУ 10", "11 вАУ 20", "Plus de 20"] },
        { id: 8, q: "L'angioscanner est-il pour vous l'examen de premi√®re intention ?", opt: ["Oui", "Non"] },
        { id: 9, q: "Ma√Ѓtrisez-vous parfaitement le protocole technique ?", opt: ["Oui", "Non"] },
        { id: 10, q: "Disposez-vous d'un injecteur automatique ?", opt: ["Oui", "Non"] },
        { id: 11, section: "III. Le Sujet √Вg√© & Communication", q: "Recevez-vous fr√©quemment des patients √Ґg√©s (+65 ans) ?", opt: ["Oui", "Non"] },
        { id: 12, q: "La r√©alisation d'un angioscanner chez un sujet √Ґg√© pr√©sente-t-elle plus de difficult√©s ?", opt: ["Oui", "Non"] },
        { id: 13, q: "Quelle est la principale difficult√© rencontr√©e ?", opt: ["Communication", "Agitation", "Acc√®s veineux"] },
        { id: 14, q: "Adaptez-vous votre fa√Іon d'expliquer l'examen ?", opt: ["Oui", "Non"] },
        { id: 15, q: "Quelle technique de communication privil√©giez-vous ?", opt: ["Lentement/Fort", "Gestes", "Accompagnant"] },
        { id: 16, q: "Pensez-vous qu'une bonne communication influence la qualit√© de l'image ?", opt: ["Oui", "Non"] },
        { id: 17, q: "Avez-vous d√©j√† d√ї recommencer une acquisition √† cause d'un d√©faut de communication ?", opt: ["Oui", "Non"] },
        { id: 18, q: "Prenez-vous plus de temps pour la pr√©paration psychologique ?", opt: ["Oui", "Non"] },
        { id: 19, q: "La pr√©sence d'un proche facilite-elle la coop√©ration ?", opt: ["Oui", "Non"] },
        { id: 20, section: "IV. Formation & Solutions", q: "Avez-vous re√Іu une formation sp√©cifique sur la communication ?", opt: ["Oui", "Non"] },
        { id: 21, q: "Pensez-vous que le r√іle du manipulateur est d√©terminant ?", opt: ["Oui", "Non"] },
        { id: 22, q: "Quel est le facteur le plus important ?", opt: ["Technique", "Communication", "Rapidit√©"] },
        { id: 23, q: "Arrivez-vous g√©n√©ralement √† trouver des solutions ?", opt: ["Oui", "Non"] },
        { id: 24, q: "Quelles sont vos strat√©gies pour rassurer un patient anxieux ?", type: "text" },
        { id: 25, q: "Quelles sont vos suggestions pour am√©liorer la prise en charge ?", type: "text" }
    ];

    window.initApp = () => {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        const qMount = document.getElementById('questions-mount');
        if(qMount.children.length > 0) return;
        
        questions.forEach(q => {
            if(q.section) {
                const s = document.createElement('div'); 
                s.className = 'section-title'; 
                s.innerText = q.section; 
                qMount.appendChild(s);
            }
            
            const card = document.createElement('div'); 
            card.className = 'q-card';
            card.innerHTML = `<p style="margin-bottom:15px; font-weight:bold;">${q.id}. ${q.q}</p>`;
            
            const box = document.createElement('div');
            
            if(q.opt) {
                q.opt.forEach(o => {
                    const b = document.createElement('button'); 
                    b.className = 'opt-btn'; 
                    b.innerText = o;
                    b.onclick = () => {
                        Array.from(box.children).forEach(el => el.classList.remove('active'));
                        b.classList.add('active'); 
                        results[q.id] = o; 
                        updateProgress();
                    };
                    box.appendChild(b);
                });
            } else {
                const t = document.createElement('textarea'); 
                t.className = 'text-area'; 
                t.placeholder = "Tapez ici...";
                t.oninput = () => { 
                    if(t.value.trim()){
                        results[q.id] = t.value.trim();
                    } else {
                        delete results[q.id];
                    } 
                    updateProgress(); 
                };
                box.appendChild(t);
            }
            
            card.appendChild(box); 
            qMount.appendChild(card);
        });
    };

    function updateProgress() {
        const count = Object.keys(results).length;
        document.getElementById('prog-val').innerText = `${count} / 25`;
        document.getElementById('main-submit').disabled = count === 0;
    }

    window.pushToCloud = async () => {
        if(!user) {
            alert("Veuillez patienter, authentification en cours...");
            return;
        }
        
        if(Object.keys(results).length < 25) {
            alert("Veuillez r√©pondre √† toutes les questions avant d'envoyer.");
            return;
        }
        
        document.getElementById('loader').style.display = 'flex';
        
        try {
            await addDoc(collection(db, COLLECTION_NAME), { 
                ...results, 
                voterId: user.uid, 
                date: new Date().toISOString() 
            });
            
            document.getElementById('survey-ui').innerHTML = `
                <div style="text-align:center; padding:100px 20px;">
                    <img src="1000037018.png" style="width:140px; border:2px solid var(--gold); border-radius:30px;">
                    <h2 style="color:var(--gold); margin-top:20px;">ENVOY√Й AVEC SUCC√ИS</h2>
                    <p style="opacity:0.6;">Merci pour votre contribution professionnelle.</p>
                    <button onclick="location.reload()" class="submit-btn" style="width:auto; padding:10px 40px;">RETOUR</button>
                </div>`;
        } catch(e) { 
            console.error("Erreur d'envoi:", e);
            alert("Erreur de connexion. V√©rifiez votre connexion internet et r√©essayez."); 
        }
        
        document.getElementById('loader').style.display = 'none';
    };

    window.adminGate = async () => {
        const pin = prompt("Code Secret :");
        if(pin === 'anwar17blt') {
            document.getElementById('loader').style.display = 'flex';
            
            try {
                const querySnapshot = await getDocs(collection(db, COLLECTION_NAME));
                cloudRecords = [];
                
                querySnapshot.forEach((doc) => {
                    cloudRecords.push({ id: doc.id, ...doc.data() });
                });
                
                document.getElementById('survey-ui').style.display = 'none';
                document.getElementById('admin-ui').style.display = 'block';
                renderAdmin();
                
            } catch(e) { 
                console.error("Erreur de chargement:", e);
                alert("Erreur lors du chargement des donn√©es."); 
            }
            
            document.getElementById('loader').style.display = 'none';
        }
    };

    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => {
            const btnText = b.innerText.toLowerCase();
            b.classList.toggle('active', btnText.includes(tab));
        });
        renderAdmin();
    };

    function renderAdmin() {
        const area = document.getElementById('admin-content');
        
        if(currentTab === 'stats') {
            let h = `<div style="text-align:center; margin-bottom:20px; color:var(--gold);">
                Nombre de participants : ${cloudRecords.length}
            </div>`;
            
            if(cloudRecords.length === 0) {
                h += '<div style="text-align:center; padding:40px;">Aucune donn√©e disponible</div>';
            } else {
                questions.forEach(q => {
                    h += `<div class="q-card"><strong>Q${q.id}. ${q.q}</strong>`;
                    
                    if(q.opt) {
                        q.opt.forEach(o => {
                            const count = cloudRecords.filter(r => r[q.id] === o).length;
                            const p = cloudRecords.length ? ((count/cloudRecords.length)*100).toFixed(1) : 0;
                            h += `
                                <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-top:10px;">
                                    <span>${o}</span>
                                    <span>${p}% (${count})</span>
                                </div>
                                <div class="stat-bar">
                                    <div class="stat-fill" style="width:${p}%"></div>
                                </div>`;
                        });
                    } else {
                        h += `<div style="font-size:0.75rem; color:#888; margin-top:10px;">
                            (Voir R√©ponses Individuelles pour les textes)
                        </div>`;
                    }
                    
                    h += `</div>`;
                });
            }
            
            area.innerHTML = h;
            
        } else {
            let h = '';
            
            if(cloudRecords.length === 0) {
                h = '<div style="text-align:center; padding:40px;">Aucune r√©ponse disponible</div>';
            } else {
                cloudRecords.forEach((r, idx) => {
                    const dateStr = r.date ? new Date(r.date).toLocaleString() : 'Date inconnue';
                    
                    h += `
                        <div class="voter-card">
                            <strong>Participant #${idx+1}</strong>
                            <br><small>Date: ${dateStr}</small>
                            <div style="margin-top:10px; font-size:0.8rem; background:#000; padding:10px; border-radius:5px;">`;
                    
                    questions.forEach(q => {
                        if(r[q.id]) {
                            h += `<p style="margin-bottom:5px;">
                                <span style="color:var(--gold)">Q${q.id}:</span> ${r[q.id]}
                            </p>`;
                        }
                    });
                    
                    h += `</div></div>`;
                });
            }
            
            area.innerHTML = h;
        }
        
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
