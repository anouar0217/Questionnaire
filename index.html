<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANGIO-SCANNER - Étude Gériatrie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
        }

        /* شاشة البداية */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .logo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #ffcc00;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 0 30px #ffcc00;
            animation: pulse 2s infinite;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            color: #ffcc00;
            margin-top: 30px;
            letter-spacing: 5px;
        }

        /* المحتوى الرئيسي */
        #main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            display: none;
        }

        .header {
            background: #111;
            border-bottom: 2px solid #ffcc00;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 20px;
        }

        .progress {
            color: #ffcc00;
            font-weight: bold;
        }

        /* أقسام الأسئلة */
        .section-title {
            background: rgba(255,204,0,0.1);
            color: #ffcc00;
            padding: 15px;
            margin: 30px 0 15px;
            border-left: 4px solid #ffcc00;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .question-card {
            background: #111;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-number {
            color: #ffcc00;
            margin-right: 8px;
        }

        .option {
            display: block;
            width: 100%;
            text-align: left;
            padding: 15px;
            margin: 8px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .option:hover {
            border-color: #ffcc00;
        }

        .option.selected {
            background: #ffcc00;
            color: black;
            font-weight: bold;
        }

        .text-input {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            min-height: 100px;
        }

        .btn-submit {
            width: 100%;
            background: #ffcc00;
            color: black;
            border: none;
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 30px 0;
        }

        .btn-submit:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* شاشة النجاح */
        .success-screen {
            text-align: center;
            padding: 50px 20px;
            background: #111;
            border-radius: 20px;
        }

        .success-screen img {
            width: 150px;
            border-radius: 20px;
            border: 3px solid #ffcc00;
            margin-bottom: 30px;
        }

        .success-screen h2 {
            color: #ffcc00;
            margin: 20px 0;
        }

        /* شاشة التحميل */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 2000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #ffcc00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* رابط الإدارة */
        .admin-link {
            text-align: center;
            color: #333;
            cursor: pointer;
            margin: 20px 0;
        }

        .admin-link:hover {
            color: #ffcc00;
        }

        /* لوحة الإدارة */
        #admin-panel {
            display: none;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .admin-header h2 {
            color: #ffcc00;
        }

        .exit-btn {
            background: red;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            background: #222;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .tab.active {
            background: #ffcc00;
            color: black;
        }

        .stat-card {
            background: #111;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .stat-bar {
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin: 8px 0;
        }

        .stat-fill {
            height: 100%;
            background: #ffcc00;
            border-radius: 4px;
        }

        .response-card {
            background: #111;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #ffcc00;
        }
    </style>
</head>
<body>

<!-- شاشة التحميل -->
<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: #ffcc00;">Connexion au cloud Firebase...</p>
</div>

<!-- شاشة البداية مع اللوغو -->
<div id="welcome-screen">
    <div class="logo" onclick="startApp()">  <!-- تم التعديل هنا: startApp() وليس initApp() -->
        <img src="1000033460.jpg" alt="Logo INFSPM" onerror="this.style.backgroundColor='#ffcc00'">
    </div>
    <h1>WELCOME</h1>
    <p style="color: #666; margin-top: 10px;">Cliquez sur le logo pour commencer</p>
</div>

<!-- المحتوى الرئيسي -->
<div id="main-content">
    <div class="header">
        <span style="font-weight: bold;">INFSPM</span>
        <span class="progress" id="progress">0 / 25</span>
    </div>

    <!-- الأسئلة ستظهر هنا -->
    <div id="questions-container"></div>

    <button class="btn-submit" id="submitBtn" onclick="sendAnswers()" disabled>FINALISER & ENVOYER</button>

    <div class="admin-link" onclick="openAdmin()">⚙️ Admin Console</div>

    <!-- لوحة الإدارة -->
    <div id="admin-panel">
        <div class="admin-header">
            <h2>CONSOLE ADMIN</h2>
            <button class="exit-btn" onclick="location.reload()">SORTIR</button>
        </div>

        <div class="tab-bar">
            <button class="tab active" onclick="switchTab('stats')">STATISTIQUES</button>
            <button class="tab" onclick="switchTab('individuals')">RÉPONSES</button>
        </div>

        <div id="admin-content"></div>
    </div>
</div>

<script type="module">
    // ========== 1. CONFIGURATION FIREBASE ==========
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔴🔴🔴 السطور التي يجب تغييرها - استبدل القيم فقط بين علامتي التنصيص 🔴🔴🔴
    const firebaseConfig = {
        apiKey: "AIzaSyDkKEdm85pDRJ5PgaSdn-lxBRyu0uZPF4Y",          // <--- غيّر هذا فقط
        authDomain: "angioscanner-survey.firebaseapp.com", // <--- غيّر هذا فقط
        projectId: "angioscanner-survey",                // <--- غيّر هذا فقط
        storageBucket: "angioscanner-survey.firebasestorage.app", // <--- غيّر هذا فقط
        messagingSenderId: "768907518533",                   // <--- غيّر هذا فقط
        appId: "1:768907518533:web:21a3de5ca64416a1b2792c"                   // <--- غيّر هذا فقط
    };

    // تهيئة Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const COLLECTION_NAME = "reponses_angioscanner";

    // ========== 2. QUESTIONS - Copie conforme du fichier Word ==========
    const questions = [
        // I. Informations professionnelles
        { id: 1, section: "I. Informations professionnelles", text: "Sexe :", options: ["Masculin", "Féminin"] },
        { id: 2, text: "Tranche d'âge :", options: ["20-30", "31-40", "41-50", ">50"] },
        { id: 3, text: "Années d'expérience :", options: ["<5 ans", "5-10 ans", "11-20 ans", ">20 ans"] },
        { id: 4, text: "Grade :", options: ["MIMSP", "MIM spécialiste", "Autre"] },
        { id: 5, text: "Type d'établissement :", options: ["Hôpital public", "Clinique privée"] },
        
        // II. Expérience en angioscanner thoracique
        { id: 6, section: "II. Expérience en angioscanner thoracique", text: "Réalisez-vous régulièrement des angioscanners thoraciques ?", options: ["Oui", "Non"] },
        { id: 7, text: "Nombre d'examens par mois :", options: ["0-5", "6-10", "11-20", ">20"] },
        { id: 8, text: "L'angioscanner est-il l'examen de première intention pour la suspicion d'embolie pulmonaire ?", options: ["Oui", "Non"] },
        { id: 9, text: "Maîtrisez-vous le protocole technique ?", options: ["Oui", "Non"] },
        { id: 10, text: "Injecteur automatique disponible ?", options: ["Oui", "Non"] },
        
        // III. Prise en charge des patients âgés
        { id: 11, section: "III. Prise en charge des patients âgés", text: "Recevez-vous fréquemment des patients âgés (>65 ans) ?", options: ["Oui", "Non"] },
        { id: 12, text: "Les patients âgés présentent-ils plus de difficultés lors de l'examen ?", options: ["Oui", "Non"] },
        { id: 13, text: "Principales difficultés :", options: ["Difficulté de communication", "Difficulté de compréhension", "Agitation ou anxiété", "Difficulté de positionnement", "Pathologies associées", "Autres"] },
        { id: 14, text: "Adaptez-vous votre explication de l'examen ?", options: ["Oui", "Non"] },
        { id: 15, text: "Techniques utilisées pour faciliter la communication :", options: ["Parler lentement", "Utiliser des gestes", "Répéter les consignes", "Impliquer un accompagnant"] },
        
        // IV. Communication gériatrique
        { id: 16, section: "IV. Communication gériatrique", text: "La communication influence-t-elle la qualité de l'examen ?", options: ["Oui", "Non"] },
        { id: 17, text: "Les difficultés de communication peuvent-elles provoquer des artéfacts ?", options: ["Oui", "Non"] },
        { id: 18, text: "Prenez-vous plus de temps avec les patients âgés ?", options: ["Oui", "Non"] },
        { id: 19, text: "La présence d'un accompagnant améliore-t-elle la coopération ?", options: ["Oui", "Non"] },
        { id: 20, text: "Avez-vous reçu une formation en communication gériatrique ?", options: ["Oui", "Non"] },
        
        // V. Qualité de l'examen et rôle du manipulateur
        { id: 21, section: "V. Qualité de l'examen et rôle du manipulateur", text: "Le manipulateur joue-t-il un rôle essentiel dans la réussite de l'examen ?", options: ["Oui", "Non"] },
        { id: 22, text: "Facteurs influençant la qualité de l'examen :", options: ["Préparation du patient", "Choix du protocole", "Communication", "Expérience du manipulateur", "Qualité de l'équipement"] },
        { id: 23, text: "Trouvez-vous des solutions face aux difficultés avec les patients âgés ?", options: ["Oui", "Non"] },
        { id: 24, text: "Si oui, quelles stratégies utilisez-vous ?", type: "text" },
        { id: 25, text: "Quelles améliorations proposez-vous pour la prise en charge des patients âgés ?", type: "text" }
    ];

    // ========== 3. VARIABLES GLOBALES ==========
    let answers = {};
    let allResponses = [];
    let currentTab = 'stats';

    // ========== 4. FONCTION POUR COMMENCER ==========
    window.startApp = function() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        renderQuestions();
    };

    // ========== 5. AFFICHER LES QUESTIONS ==========
    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        questions.forEach(q => {
            // Titre de section
            if (q.section) {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'section-title';
                sectionDiv.textContent = q.section;
                container.appendChild(sectionDiv);
            }

            // Carte question
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `<span class="question-number">${q.id}.</span> ${q.text}`;
            card.appendChild(qText);

            // Options ou texte
            if (q.options) {
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option';
                    btn.textContent = opt;
                    btn.onclick = function() {
                        // Enlever la sélection précédente
                        card.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        answers[q.id] = opt;
                        updateProgress();
                    };
                    card.appendChild(btn);
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.className = 'text-input';
                textarea.placeholder = 'Votre réponse...';
                textarea.oninput = function(e) {
                    answers[q.id] = e.target.value;
                    updateProgress();
                };
                card.appendChild(textarea);
            }

            container.appendChild(card);
        });
    }

    // ========== 6. METTRE À JOUR LA PROGRESSION ==========
    function updateProgress() {
        const count = Object.keys(answers).length;
        document.getElementById('progress').textContent = `${count} / 25`;
        document.getElementById('submitBtn').disabled = count < 25;
    }

    // ========== 7. ENVOYER LES RÉPONSES À FIREBASE ==========
    window.sendAnswers = async function() {
        if (Object.keys(answers).length < 25) {
            alert('Veuillez répondre à toutes les questions.');
            return;
        }

        showLoader(true);

        try {
            const dataToSend = {
                ...answers,
                date: new Date().toISOString(),
                timestamp: Date.now()
            };

            await addDoc(collection(db, COLLECTION_NAME), dataToSend);
            
            // Afficher l'écran de succès avec l'image de remerciement
            const container = document.getElementById('questions-container');
            container.innerHTML = `
                <div class="success-screen">
                    <img src="1000037018.png" alt="Merci" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22><circle cx=%2275%22 cy=%2275%22 r=%2270%22 fill=%22%23ffcc00%22/><text x=%2275%22 y=%2290%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22%23000%22>✓</text></svg>'">
                    <h2>ENVOYÉ AVEC SUCCÈS</h2>
                    <p>Merci pour votre participation.</p>
                    <button onclick="location.reload()" class="btn-submit" style="width: auto; padding: 12px 40px;">RETOUR</button>
                </div>
            `;
            
            document.getElementById('submitBtn').style.display = 'none';
            
        } catch (error) {
            console.error('Erreur Firebase:', error);
            alert('Erreur de connexion à Firebase. Vérifiez votre configuration.');
        } finally {
            showLoader(false);
        }
    };

    // ========== 8. FONCTIONS ADMIN ==========
    window.openAdmin = async function() {
        const code = prompt('Code admin:');
        if (code !== 'anwar17blt') {
            alert('Code incorrect');
            return;
        }

        showLoader(true);

        try {
            const querySnapshot = await getDocs(collection(db, COLLECTION_NAME));
            allResponses = [];
            querySnapshot.forEach(doc => {
                allResponses.push({ id: doc.id, ...doc.data() });
            });

            // Cacher les éléments normaux
            document.querySelector('.header').style.display = 'none';
            document.getElementById('questions-container').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'none';
            document.querySelector('.admin-link').style.display = 'none';
            
            // Afficher le panneau admin
            document.getElementById('admin-panel').style.display = 'block';
            
            renderAdminPanel();
            
        } catch (error) {
            console.error('Erreur chargement admin:', error);
            alert('Erreur lors du chargement des données');
        } finally {
            showLoader(false);
        }
    };

    window.switchTab = function(tab) {
        currentTab = tab;
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        
        renderAdminPanel();
    };

    function renderAdminPanel() {
        const content = document.getElementById('admin-content');
        
        if (allResponses.length === 0) {
            content.innerHTML = '<div style="text-align: center; padding: 50px;">Aucune réponse pour le moment</div>';
            return;
        }

        if (currentTab === 'stats') {
            let html = `<h3 style="margin-bottom: 20px;">Total: ${allResponses.length} participants</h3>`;

            questions.forEach(q => {
                if (!q.options) return;
                
                html += '<div class="stat-card">';
                html += `<h4>Q${q.id}. ${q.text}</h4>`;

                const counts = {};
                q.options.forEach(opt => counts[opt] = 0);

                allResponses.forEach(r => {
                    if (r[q.id] && counts.hasOwnProperty(r[q.id])) {
